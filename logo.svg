<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250" width="250" height="250">
  <!-- Фон -->
  <rect width="250" height="250" rx="40" fill="#1a1a1a"/>

  <!-- Страница / контент -->
  <rect x="40" y="30" width="170" height="155" rx="12" fill="#2a2a2a" stroke="#c0a0ff" stroke-width="4" opacity="0.9"/>

  <!-- Строки контента на странице -->
  <rect x="58" y="52" width="110" height="8" rx="4" fill="#c0a0ff" opacity="0.5"/>
  <rect x="58" y="68" width="90" height="8" rx="4" fill="#c0a0ff" opacity="0.35"/>
  <rect x="58" y="84" width="100" height="8" rx="4" fill="#c0a0ff" opacity="0.35"/>
  <rect x="58" y="100" width="75" height="8" rx="4" fill="#c0a0ff" opacity="0.25"/>

  <!-- Разделитель перед футером -->
  <line x1="40" y1="148" x2="210" y2="148" stroke="#c0a0ff" stroke-width="2" opacity="0.4"/>

  <!-- Футер — блок внизу страницы -->
  <rect x="40" y="148" width="170" height="37" rx="0" fill="#222233" opacity="0.95"/>
  <rect x="40" y="173" width="170" height="12" rx="0 0 12 12" fill="#222233" opacity="0.95"/>

  <!-- Текстовые строки футера -->
  <rect x="58" y="157" width="55" height="5" rx="2.5" fill="#c0a0ff" opacity="0.55"/>
  <rect x="120" y="157" width="40" height="5" rx="2.5" fill="#c0a0ff" opacity="0.4"/>
  <rect x="167" y="157" width="28" height="5" rx="2.5" fill="#c0a0ff" opacity="0.3"/>
  <rect x="58" y="168" width="80" height="4" rx="2" fill="#c0a0ff" opacity="0.25"/>

  <!-- Красная перечёркивающая линия -->
  <line x1="38" y1="38" x2="212" y2="212" stroke="#ff4d4d" stroke-width="14" stroke-linecap="round"/>
  <line x1="38" y1="38" x2="212" y2="212" stroke="#ff000044" stroke-width="20" stroke-linecap="round"/>
</svg>
